<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Video</title>
    <style>
        /* Remove margins and scrollbars */
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* Force video to fill the screen without distortion */
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            object-fit: cover; /* Crops cleanly to fill the entire screen */
        }
    </style>
</head>
<body>

    <!-- 
      autoplay    : starts the video immediately
      loop        : repeats the video continuously
      muted       : silences the audio (required by modern web browsers for autoplay to work)
      playsinline : optimizes playback on mobile devices
    -->
    <video autoplay loop muted playsinline>
        <source src="vid1.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
