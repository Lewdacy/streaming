<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Fullscreen Playlist</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }
        video {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            transform: translate(-50%, -50%);
            object-fit: cover;
            transition: opacity 0.1s ease-in-out;
        }
        .hidden {
            opacity: 0;
            z-index: 1;
        }
        .visible {
            opacity: 1;
            z-index: 2;
        }
    </style>
</head>
<body>

    <video id="playerA" class="visible" autoplay muted playsinline src="vid1.mp4"></video>
    <video id="playerB" class="hidden" muted playsinline src="vid2.mp4" preload="auto"></video>

    <script>
        const playlist = ["vid1.mp4", "vid2.mp4", "vid3.mp4", "vid4.mp4", "vid5.mp4", "vid6.mp4"];
        let currentTrackIndex = 0;

        const playerA = document.getElementById("playerA");
        const playerB = document.getElementById("playerB");

        function switchPlayers(activePlayer, nextPlayer) {
            nextPlayer.play().then(() => {
                nextPlayer.className = "visible";
                activePlayer.className = "hidden";

                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
                const nextTrackIndex = (currentTrackIndex + 1) % playlist.length;
                
                activePlayer.src = playlist[nextTrackIndex];
                activePlayer.load();
            }).catch(error => {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
                const skippedIndex = (currentTrackIndex + 1) % playlist.length;
                nextPlayer.src = playlist[skippedIndex];
                nextPlayer.load();
                switchPlayers(activePlayer, nextPlayer);
            });
        }

        playerA.addEventListener("ended", function() {
            switchPlayers(playerA, playerB);
        });

        playerB.addEventListener("ended", function() {
            switchPlayers(playerB, playerA);
        });

        playerA.addEventListener("error", function() {
            switchPlayers(playerA, playerB);
        }, true);
        playerB.addEventListener("error", function() {
            switchPlayers(playerB, playerA);
        }, true);
    </script>

</body>
</html>
